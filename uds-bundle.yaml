kind: UDSBundle
metadata:
  name: blue-app
  description: Bundle for blue app from exia labs
  version: 0.0.1
packages:
  - name: blue-app
    repository: registry.uds-mil.us/exia-labs/blue-app
    ref: "2.0.5"
    overrides:
      blue-app-uds-config:
        blue-app-uds-config:
          values:
            - path: postgresNamespace
              value: postgres
            - path: egressPostgresHost
              value: uds-service-blue.postgres.svc.cluster.local
            - path: postgresClusterName
              value: uds-service-blue
            # Overrided from the initial default of `minio` used by the minio operator UDS package
            - path: s3Namespace
              value: minio-tenants
            - path: s3RemoteSelector
              value:
                v1.min.io/tenant: uds-minio
      service-blue:
        service-blue:
          values:
            - path: env
              value:
                - name: POSTGRES__USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: blue.service-blue.uds-service-blue.credentials.postgresql.acid.zalan.do
                      key: username
                - name: POSTGRES__PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: blue.service-blue.uds-service-blue.credentials.postgresql.acid.zalan.do
                      key: password
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: minio-blue
                      key: accessKey
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: minio-blue
                      key: secretKey
                # Here is where we would supply secrets via ESO
                - name: GOOGLE__SIGNING_SECRET
                  value: ABigSecretThatIsVerySecure