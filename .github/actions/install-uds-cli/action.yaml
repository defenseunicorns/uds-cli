name: Install UDS CLI
description: installs uds-cli from brew
runs:
  using: composite
  steps:
    - name: Set up Homebrew
      uses: Homebrew/actions/setup-homebrew@f78b97900ce6c3c9c4e99de00a999e5541eeaabb # main

    - name: Install UDS CLI
      shell: bash
      run: |
        brew tap defenseunicorns/tap
        # GHA runners don't support user namespaces, so `brew trust` (which uses bubblewrap) fails.
        # Write the trust file directly instead, and disable the Linux sandbox for install.
        mkdir -p "${HOMEBREW_USER_CONFIG_HOME:-$HOME/.config/homebrew}"
        echo '{"trustedtaps":["defenseunicorns/tap"]}' > "${HOMEBREW_USER_CONFIG_HOME:-$HOME/.config/homebrew}/trust.json"
        HOMEBREW_NO_SANDBOX_LINUX=1 brew install uds
