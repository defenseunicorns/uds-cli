name: CI Docs

# Permissions for the GITHUB_TOKEN used by the workflow.
permissions:
  contents: read # Allows reading the content of the repository.

on:
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - "**.md"
      - "**.mdx"
      - "**.jpg"
      - "**.png"
      - "**.gif"
      - "**.svg"
      - docs/**
      - .vscode/**
      - .gitignore
      - renovate.json
      - CODEOWNERS
      - LICENSE
      - hack/generate-docs.sh
      - hack/test-docs.sh
      - .github/workflows/docs-shim.yaml

jobs:
  docs-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup golang
        uses: ./.github/actions/golang

      - name: Install UDS CLI
        uses: ./.github/actions/install-uds-cli

      - name: Test docs
        run: uds run docs:test

      - name: Save logs
        if: always()
        uses: ./.github/actions/save-logs
        with:
          suffix: validate-docs

  docs-link-check:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Install UDS CLI
        uses: ./.github/actions/install-uds-cli

      - name: Check UDS Docs links
        run: uds run uds-docs-validate

  # Shim required checks so docs-only PRs can merge without running full E2E CI
  test:
    uses: ./.github/workflows/test-shim.yaml
