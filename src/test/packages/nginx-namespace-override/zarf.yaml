    required: true
    manifests:
      - name: simple-nginx-deployment
        namespace: nginx
        files:
          - https://k8s.io/examples/application/deployment.yaml@c57f73449b26eae02ca2a549c388807d49ef6d3f2dc040a9bbb1290128d97157
    images:
      - nginx:1.14.2
