kind: UDSBundle
metadata:
  name: all-the-inits
  description: deploys both local and remote init packages
  version: 0.0.1
# contrived bundle to test local + remote Zarf inits
# cannot do uds remove on this pkg due to having the same name
packages:
  - name: init
    path: "../../packages"
    # renovate: datasource=github-tags depName=zarf-dev/zarf
    ref: v0.81.1
    keylessVerification:
      certificateIdentityRegexp: https://github\.com/zarf-dev/zarf/\.github/workflows/release\.yml@refs/tags/v\d+\.\d+\.\d+
      certificateOIDCIssuer: https://token.actions.githubusercontent.com
    optionalComponents:
      - git-server
  - name: init
    repository: ghcr.io/zarf-dev/packages/init
    # renovate: datasource=github-tags depName=zarf-dev/zarf
    ref: v0.81.1
    keylessVerification:
      certificateIdentityRegexp: https://github\.com/zarf-dev/zarf/\.github/workflows/release\.yml@refs/tags/v\d+\.\d+\.\d+
      certificateOIDCIssuer: https://token.actions.githubusercontent.com
    optionalComponents:
      - git-server
